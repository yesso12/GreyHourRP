name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  web-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install Web Dependencies
        run: npm ci

      - name: Build Web
        run: npm run build

      - name: Policy Gate
        run: npm run policy:gate

      - name: Local Smoke (dist shell checks)
        run: |
          npm run preview -- --host 127.0.0.1 --port 4173 >/tmp/preview.log 2>&1 &
          PREVIEW_PID=$!
          for i in $(seq 1 25); do
            if curl -sSf http://127.0.0.1:4173/ >/dev/null; then
              break
            fi
            sleep 1
          done
          SMOKE_BASE_URL="http://127.0.0.1:4173" npm run smoke
          kill "${PREVIEW_PID}" || true

  bot-tests:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: discord-bot
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: discord-bot/package-lock.json

      - name: Install Bot Dependencies
        run: npm ci

      - name: Run Bot Unit Tests
        run: npm test
