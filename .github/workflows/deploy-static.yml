name: Deploy Static Site

on:
  push:
    branches:
      - main
    paths:
      - "src/**"
      - "public/**"
      - "scripts/deploy-static.sh"
      - "scripts/rollback-static.sh"
      - "scripts/health-check-all.sh"
      - "scripts/self-heal.sh"
      - "package.json"
      - "package-lock.json"
      - "vite.config.ts"
      - "tsconfig*.json"
      - ".github/workflows/deploy-static.yml"
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required: true
        default: "production"
        type: choice
        options:
          - staging
          - production

concurrency:
  group: deploy-static-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - name: Install Dependencies
        run: npm ci
      - name: Build Release
        run: npm run build:release
      - name: Policy Gate
        run: npm run policy:gate
      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: web-dist
          path: dist/

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment: ${{ github.event_name == 'workflow_dispatch' && inputs.environment || 'production' }}
    steps:
      - name: Download Build Artifact
        uses: actions/download-artifact@v4
        with:
          name: web-dist
          path: dist

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            mkdir -p /tmp/greyhourrp-dist/assets

      - name: Copy Artifacts
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          source: "dist/*"
          target: "/tmp/greyhourrp-dist"
          strip_components: 1

      - name: Activate Release
        id: activate_release
        uses: appleboy/ssh-action@v1.0.3
        env:
          CANARY_SMOKE_BASE_URL: ${{ secrets.CANARY_SMOKE_BASE_URL }}
          SMOKE_BASE_URL: ${{ secrets.PUBLIC_BASE_URL }}
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            set -e
            sudo CANARY_SMOKE_BASE_URL="${CANARY_SMOKE_BASE_URL:-}" SMOKE_BASE_URL="${SMOKE_BASE_URL:-https://greyhourrp.xyz}" /opt/greyhourrp/scripts/canary-promote.sh /tmp/greyhourrp-dist /var/www/greyhourrp

      - name: Post-Deploy Health Check
        id: post_deploy_health
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            set -e
            cd /opt/greyhourrp
            sudo CHECK_DISCORD_BOT_SERVICE=false RUN_BOT_SMOKE_CHECK=false npm run health:full

      - name: SLO Guard Verification
        id: slo_guard
        uses: appleboy/ssh-action@v1.0.3
        env:
          PUBLIC_BASE_URL: ${{ secrets.PUBLIC_BASE_URL }}
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            set -e
            cd /opt/greyhourrp
            sudo SMOKE_BASE_URL="${PUBLIC_BASE_URL:-https://greyhourrp.xyz}" SLO_CHECK_COUNT=2 SLO_FAIL_THRESHOLD=2 npm run slo:guard

      - name: Auto Rollback On Health Failure
        if: failure()
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            set -e
            sudo /opt/greyhourrp/scripts/rollback-static.sh /var/www/greyhourrp latest

      - name: Verify After Rollback
        if: failure()
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            set -e
            cd /opt/greyhourrp
            sudo CHECK_DISCORD_BOT_SERVICE=false RUN_BOT_SMOKE_CHECK=false npm run health:full
