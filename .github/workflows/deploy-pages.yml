name: Deploy GreyHourRP Site
on:
  push:
    branches: [ 'main' ]

permissions:
  contents: write
jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install dependencies
        run: npm install
      - name: Build site
        run: npm run build
      - name: Ensure SPA fallback page
        run: |
          set -euo pipefail
          if [[ ! -f dist/404.html ]]; then
            cp public/404.html dist/404.html
          fi
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: dist
          user_name: GreyHourRP Site Builder
          user_email: deploy@greyhourrp.com
          keep_files: false
          cname: greyhourrp.xyz
